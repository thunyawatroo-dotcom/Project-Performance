<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supalai Dashboard - Full Feature</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root { --muji-bg: #f8f5f2; --muji-accent: #8c8179; }
        body { font-family: 'Anuphan', sans-serif; background-color: var(--muji-bg); color: #544f4b; }
        .soft-card { background: #ffffff; border: 1px solid #eeeae5; border-radius: 24px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.02); }
        .stat-label { font-size: 10px; font-weight: 700; color: #a8a29e; text-transform: uppercase; letter-spacing: 0.1em; }
        .stat-value { font-size: 24px; font-weight: 600; }
        .chart-container { position: relative; height: 350px; width: 100%; }
        input, select { border: 1px solid #e5e0da !important; border-radius: 12px !important; padding: 10px 15px !important; outline: none !important; }
        .btn-primary { background-color: var(--muji-accent); color: white; transition: all 0.3s; }
        .btn-primary:hover { background-color: #6e655e; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="text-3xl font-semibold text-stone-800 tracking-tight">Supalai Analytics</h1>
                <p class="text-stone-400 font-light italic">Year Range: 2569 - 2574 (with Image Compression)</p>
            </div>
            
            <div class="flex items-center gap-2 bg-white p-2 rounded-2xl border border-stone-200 shadow-sm">
                <select id="profileSelector" onchange="changeProfile()" class="border-none bg-transparent text-sm font-semibold pr-8 focus:ring-0"></select>
                <div class="flex items-center border-l border-stone-100 ml-1 pl-1">
                    <button onclick="createNewProfile()" class="p-2 text-stone-400 hover:text-stone-600"><i data-lucide="plus-circle" class="w-5 h-5"></i></button>
                    <button id="deleteProfileBtn" onclick="deleteCurrentProfile()" class="p-2 text-red-400 hover:text-red-600 hidden"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-10 text-center">
            <div class="soft-card p-6"><span class="stat-label">Total Leads</span><div class="stat-value" id="totalLeads">0</div></div>
            <div class="soft-card p-6"><span class="stat-label">Total Walk</span><div class="stat-value" id="totalWalk">0</div></div>
            <div class="soft-card p-6"><span class="stat-label">Total Revisit</span><div class="stat-value" id="totalRev">0</div></div>
            <div class="soft-card p-6"><span class="stat-label">Total Booking</span><div class="stat-value" id="totalBook">0</div></div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-4" id="formPanel">
                <div class="soft-card p-8 sticky top-10">
                    <h2 class="text-lg font-medium mb-6 flex items-center gap-2 text-stone-600"><i data-lucide="image-plus"></i> บันทึกข้อมูล</h2>
                    <form id="dataForm" class="space-y-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-stone-400 uppercase tracking-widest">โครงการ</label>
                            <div class="flex gap-1 items-center">
                                <select id="projName" required class="flex-1"></select>
                                <button type="button" onclick="addNewProjectName()" class="bg-stone-100 p-3 rounded-xl hover:bg-stone-200"><i data-lucide="plus" class="w-5 h-5"></i></button>
                                <button type="button" onclick="deleteProjectName()" class="bg-red-50 p-3 rounded-xl text-red-400 hover:bg-red-100"><i data-lucide="x" class="w-5 h-5"></i></button>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-[10px] font-bold text-stone-400">ปี พ.ศ.</label><select id="projYear" class="w-full"></select></div>
                            <div><label class="text-[10px] font-bold text-stone-400">เดือน</label>
                                <select id="projMonth" class="w-full">
                                    <option>มกราคม</option><option>กุมภาพันธ์</option><option>มีนาคม</option>
                                    <option>เมษายน</option><option>พฤษภาคม</option><option>มิถุนายน</option>
                                    <option>กรกฎาคม</option><option>สิงหาคม</option><option>กันยายน</option>
                                    <option>ตุลาคม</option><option>พฤศจิกายน</option><option>ธันวาคม</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="projLeads" placeholder="Leads" required class="w-full">
                            <input type="number" id="projWalk" placeholder="Walk" required class="w-full">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="projRev" placeholder="Revisit" required class="w-full">
                            <input type="number" id="projBook" placeholder="Booking" required class="w-full">
                        </div>
                        
                        <div class="space-y-1">
                            <label class="text-[10px] font-bold text-stone-400 uppercase tracking-widest">แนบรูปภาพ (จะถูกบีบอัดอัตโนมัติ)</label>
                            <input type="file" id="projImg" accept="image/*" class="w-full text-xs text-stone-400 border p-2 rounded-xl">
                        </div>

                        <button type="submit" class="w-full btn-primary font-medium py-4 rounded-2xl shadow-lg mt-2">บันทึกข้อมูลและรูป</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-8" id="contentPanel">
                <div class="space-y-10">
                    <div class="flex items-center gap-3 bg-white/50 p-4 rounded-3xl border border-stone-200">
                        <select id="projectFilter" onchange="initDashboard()" class="bg-white border-none text-sm font-medium rounded-xl flex-1"><option value="all">ทุกโครงการ</option></select>
                        <select id="yearFilter" onchange="initDashboard()" class="bg-white border-none text-sm font-medium rounded-xl w-32"></select>
                    </div>

                    <div class="soft-card p-8 md:p-10"><div class="chart-container"><canvas id="supalaiChart"></canvas></div></div>
                    
                    <div id="imageGallery" class="grid grid-cols-4 md:grid-cols-6 gap-4"></div>

                    <div class="soft-card overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-stone-50 text-stone-400 text-[10px] font-bold uppercase border-b">
                                <tr>
                                    <th class="px-8 py-5">Period</th><th class="px-4 py-5 text-center">L:W</th><th class="px-4 py-5 text-center">W:B</th><th class="px-6 py-5 text-center">Action</th>
                                </tr>
                            </thead>
                            <tbody id="dataTable" class="divide-y text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const DB_KEY = 'SUPALAI_FINAL_V2569';
        const MASTER_ID = 'MASTER_VIEW';
        let db = JSON.parse(localStorage.getItem(DB_KEY)) || { 
            profiles: { "ส่วนกลาง": [] }, 
            projectNames: { "ส่วนกลาง": ["ศุภาลัย พรีโม่"] },
            activeProfile: "ส่วนกลาง" 
        };
        let myChart = null;

        function setupYearOptions() {
            const years = [2569, 2570, 2571, 2572, 2573, 2574];
            document.getElementById('projYear').innerHTML = years.map(y => `<option value="${y}">${y}</option>`).join('');
            document.getElementById('yearFilter').innerHTML = '<option value="all">ทุกปี</option>' + years.map(y => `<option value="${y}">${y}</option>`).join('');
        }

        function save() { 
            try {
                localStorage.setItem(DB_KEY, JSON.stringify(db)); 
            } catch(e) {
                alert("พื้นที่จัดเก็บเต็ม! โปรดลบรูปภาพหรือข้อมูลที่ไม่ใช้ออกบ้างครับ");
            }
        }

        function addNewProjectName() {
            const name = prompt("ระบุชื่อโครงการใหม่:");
            if (name && name.trim()) {
                if (!db.projectNames[db.activeProfile]) db.projectNames[db.activeProfile] = [];
                db.projectNames[db.activeProfile].push(name.trim());
                save(); updateProjectDropdown();
            }
        }

        function deleteProjectName() {
            const val = document.getElementById('projName').value;
            if (val && confirm(`ลบชื่อโครงการ "${val}"?`)) {
                db.projectNames[db.activeProfile] = db.projectNames[db.activeProfile].filter(n => n !== val);
                save(); updateProjectDropdown();
            }
        }

        function updateProjectDropdown() {
            const sel = document.getElementById('projName');
            const list = db.projectNames[db.activeProfile] || [];
            sel.innerHTML = list.map(n => `<option value="${n}">${n}</option>`).join('') || '<option value="">-- เพิ่มโครงการ --</option>';
        }

        // --- ระบบบีบอัดรูปภาพ ---
        function compressAndSave(file, name) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const MAX_WIDTH = 800; // บีบความกว้างให้เหลือ 800px

                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // บันทึกเป็น JPEG คุณภาพ 0.7 (บีบอัดได้เยอะมาก)
                    const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    processAdd(compressedBase64, name);
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('dataForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const file = document.getElementById('projImg').files[0];
            const name = document.getElementById('projName').value;
            if(!name) return alert("โปรดเลือกโครงการ");

            if (file) {
                compressAndSave(file, name);
            } else {
                processAdd(null, name);
            }
        });

        function processAdd(img, name) {
            const entry = {
                id: Date.now(), name: name,
                year: document.getElementById('projYear').value,
                month: document.getElementById('projMonth').value,
                leads: +document.getElementById('projLeads').value || 0,
                walk: +document.getElementById('projWalk').value || 0,
                rev: +document.getElementById('projRev').value || 0,
                book: +document.getElementById('projBook').value || 0,
                img: img
            };
            db.profiles[db.activeProfile].push(entry);
            save();
            document.getElementById('dataForm').reset();
            initDashboard();
        }

        function initDashboard() {
            const isMaster = db.activeProfile === MASTER_ID;
            let allData = [];
            document.getElementById('formPanel').style.display = isMaster ? 'none' : 'block';
            
            if (isMaster) {
                Object.keys(db.profiles).forEach(p => db.profiles[p].forEach(item => allData.push({...item, pOrigin: p})));
            } else { 
                allData = db.profiles[db.activeProfile] || [];
                updateProjectDropdown();
            }

            const pFilter = document.getElementById('projectFilter').value;
            const yFilter = document.getElementById('yearFilter').value;
            const uniqueProjects = [...new Set(allData.map(d => d.name))];
            document.getElementById('projectFilter').innerHTML = '<option value="all">ทุกโครงการ</option>' + uniqueProjects.map(p => `<option value="${p}" ${p === pFilter ? 'selected' : ''}>${p}</option>`).join('');

            let filtered = allData;
            if (pFilter !== 'all') filtered = filtered.filter(d => d.name === pFilter);
            if (yFilter !== 'all') filtered = filtered.filter(d => d.year === yFilter);

            updateSummary(filtered);
            renderChart(filtered);
            renderTable(filtered, isMaster);
            renderGallery(filtered);
            lucide.createIcons();
        }

        function updateSummary(data) {
            const sums = data.reduce((acc, x) => ({
                l: acc.l + x.leads, w: acc.w + x.walk, r: acc.r + x.rev, b: acc.b + x.book
            }), { l: 0, w: 0, r: 0, b: 0 });

            document.getElementById('totalLeads').innerText = sums.l.toLocaleString();
            document.getElementById('totalWalk').innerText = sums.w.toLocaleString();
            document.getElementById('totalRev').innerText = sums.r.toLocaleString();
            document.getElementById('totalBook').innerText = sums.b.toLocaleString();
        }

        function renderChart(data) {
            const ctx = document.getElementById('supalaiChart').getContext('2d');
            const mos = ["มกราคม", "กุมภาพันธ์", "มีนาคม", "เมษายน", "พฤษภาคม", "มิถุนายน", "กรกฎาคม", "สิงหาคม", "กันยายน", "ตุลาคม", "พฤศจิกายน", "ธันวาคม"];
            const gd = (k) => mos.map(m => data.filter(x => x.month === m).reduce((s, x) => s + x[k], 0));
            if (myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: mos,
                    datasets: [
                        { label: 'Leads', data: gd('leads'), backgroundColor: '#8c8179', borderRadius: 4 },
                        { label: 'Walk', data: gd('walk'), backgroundColor: '#a78bfa', borderRadius: 4 },
                        { label: 'Rev', data: gd('rev'), backgroundColor: '#fbbf24', borderRadius: 4 },
                        { label: 'Book', data: gd('book'), backgroundColor: '#10b981', borderRadius: 4 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function renderTable(data, isMaster) {
            document.getElementById('dataTable').innerHTML = data.slice().reverse().map(x => `
                <tr class="hover:bg-stone-50 transition-all">
                    <td class="px-8 py-5">
                        <div class="font-medium text-stone-700">${x.name}</div>
                        <div class="text-[10px] text-stone-400 font-bold">${x.month} ${x.year}</div>
                    </td>
                    <td class="px-4 py-5 text-center font-bold">${x.walk ? (x.leads/x.walk).toFixed(1) : x.leads}:1</td>
                    <td class="px-4 py-5 text-center font-bold">${x.book ? (x.walk/x.book).toFixed(1) : x.walk}:1</td>
                    <td class="px-6 py-5 text-center">
                        <button onclick="deleteItem(${x.id}, '${x.pOrigin || ""}')" class="text-stone-300 hover:text-red-400"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function renderGallery(data) {
            const withImg = data.filter(x => x.img).slice(-6); // โชว์ 6 รูปล่าสุด
            document.getElementById('imageGallery').innerHTML = withImg.map(x => `
                <div class="aspect-square soft-card overflow-hidden bg-stone-100">
                    <img src="${x.img}" class="w-full h-full object-cover">
                </div>
            `).join('');
        }

        function deleteItem(id, pOrigin) {
            if(confirm('ลบรายการนี้?')) {
                const target = pOrigin || db.activeProfile;
                db.profiles[target] = db.profiles[target].filter(x => x.id !== id);
                save(); initDashboard();
            }
        }

        // Profile Functions
        function createNewProfile() {
            const name = prompt("ชื่อ Profile ใหม่:");
            if (name && !db.profiles[name]) {
                db.profiles[name] = []; db.projectNames[name] = ["โครงการใหม่"];
                db.activeProfile = name; save(); renderProfileList(); initDashboard();
            }
        }
        function deleteCurrentProfile() {
            if(confirm(`ลบโปรไฟล์ "${db.activeProfile}"?`)) {
                delete db.profiles[db.activeProfile];
                db.activeProfile = Object.keys(db.profiles)[0] || "ส่วนกลาง";
                save(); renderProfileList(); initDashboard();
            }
        }
        function renderProfileList() {
            const sel = document.getElementById('profileSelector');
            let opts = Object.keys(db.profiles).map(p => `<option value="${p}" ${p === db.activeProfile ? 'selected' : ''}>${p}</option>`).join('');
            opts += `<option value="${MASTER_ID}">--- MASTER VIEW ---</option>`;
            sel.innerHTML = opts;
            document.getElementById('deleteProfileBtn').classList.toggle('hidden', db.activeProfile === MASTER_ID);
        }
        function changeProfile() { db.activeProfile = document.getElementById('profileSelector').value; save(); renderProfileList(); initDashboard(); }

        window.onload = () => { setupYearOptions(); renderProfileList(); initDashboard(); };
    </script>
</body>
</html>
